<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .status {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
        }
        
        .board {
            background: #deb887;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        canvas {
            display: block;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            max-width: 100vw;
            max-height: 70vh;
        }
        
        canvas:focus {
            outline: none;
        }
        
        /* 手机端响应式 */
        @media (max-width: 500px) {
            h1 {
                font-size: 1.5rem;
                margin-bottom: 10px;
            }
            
            .status {
                font-size: 1rem;
                padding: 8px 20px;
                margin-bottom: 10px;
            }
            
            .score {
                gap: 20px;
                margin-bottom: 10px;
            }
            
            .player {
                font-size: 0.9rem;
                padding: 8px 15px;
            }
            
            .controls {
                margin-top: 15px;
                gap: 10px;
            }
            
            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        
        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-restart {
            background: #e74c3c;
            color: white;
        }
        
        .btn-restart:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        
        .btn-undo {
            background: #3498db;
            color: white;
        }
        
        .btn-undo:hover {
            background: #2980b9;
            transform: scale(1.05);
        }
        
        .score {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }
        
        .player {
            color: #fff;
            font-size: 1.2rem;
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .player.black {
            background: rgba(0,0,0,0.5);
            border: 2px solid #000;
        }
        
        .player.white {
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
        }
        
        .player.active {
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .winner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #ffd700;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 2rem;
            text-align: center;
            display: none;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0);
            }
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        .winner.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>🎮 五子棋对战</h1>
    
    <div class="score">
        <div class="player black" id="blackPlayer">⚫ 黑方</div>
        <div class="player white" id="whitePlayer">⚪ 白方</div>
    </div>
    
    <div class="status" id="status">当前回合: ⚫ 黑方</div>
    
    <div class="board">
        <canvas id="board" width="450" height="450"></canvas>
    </div>
    
    <div class="controls">
        <button class="btn-undo" onclick="undo()">↩ 悔棋</button>
        <button class="btn-restart" onclick="restart()">🔄 重新开始</button>
    </div>
    
    <div class="winner" id="winner">
        <div id="winnerText"></div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        
        // 响应式棋盘大小
        function resizeCanvas() {
            const screenWidth = window.innerWidth;
            const maxSize = Math.min(screenWidth - 40, 450);
            canvas.width = maxSize;
            canvas.height = maxSize;
            
            // 重新计算格子大小
            CELL_SIZE = (maxSize - 30) / (GRID_SIZE - 1);
        }
        
        const GRID_SIZE = 15;
        let CELL_SIZE = 30;
        const MARGIN = 15;
        
        let board = [];
        let currentPlayer = 'black'; // black or white
        let gameOver = false;
        let history = [];
        
        // 初始化棋盘
        function initBoard() {
            board = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    board[i][j] = null;
                }
            }
            offscreenCanvas = null;  // 重建棋盘背景
        }
        
        // 绘制整盘棋 - 优化：棋盘只画一次
        let boardDrawn = false;
        
        function drawBoard() {
            if (boardDrawn) return;
            
            ctx.fillStyle = '#deb887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            
            // 画横线
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(MARGIN, MARGIN + i * CELL_SIZE);
                ctx.lineTo(MARGIN + (GRID_SIZE - 1) * CELL_SIZE, MARGIN + i * CELL_SIZE);
                ctx.stroke();
            }
            
            // 画竖线
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(MARGIN + i * CELL_SIZE, MARGIN);
                ctx.lineTo(MARGIN + i * CELL_SIZE, MARGIN + (GRID_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }
            
            // 画天元和星位
            const starPoints = [[3,3], [3,11], [11,3], [11,11], [7,7]];
            ctx.fillStyle = '#000';
            for (const [x, y] of starPoints) {
                ctx.beginPath();
                ctx.arc(MARGIN + x * CELL_SIZE, MARGIN + y * CELL_SIZE, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 绘制棋子 - 优化：去掉阴影
        function drawPiece(row, col, color) {
            const x = MARGIN + col * CELL_SIZE;
            const y = MARGIN + row * CELL_SIZE;
            
            ctx.beginPath();
            ctx.arc(x, y, 13, 0, Math.PI * 2);
            
            const gradient = ctx.createRadialGradient(x - 3, y - 3, 2, x, y, 13);
            if (color === 'black') {
                gradient.addColorStop(0, '#444');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ddd');
            }
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // 绘制整盘棋 - 使用双缓冲
        let offscreenCanvas = null;
        
        function draw() {
            // 首次创建离屏canvas
            if (!offscreenCanvas) {
                offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = canvas.width;
                offscreenCanvas.height = canvas.height;
                const offCtx = offscreenCanvas.getContext('2d');
                
                // 绘制棋盘到底层canvas
                offCtx.fillStyle = '#deb887';
                offCtx.fillRect(0, 0, 450, 450);
                
                offCtx.strokeStyle = '#000';
                offCtx.lineWidth = 1;
                
                for (let i = 0; i < GRID_SIZE; i++) {
                    offCtx.beginPath();
                    offCtx.moveTo(MARGIN, MARGIN + i * CELL_SIZE);
                    offCtx.lineTo(MARGIN + (GRID_SIZE - 1) * CELL_SIZE, MARGIN + i * CELL_SIZE);
                    offCtx.stroke();
                    
                    offCtx.beginPath();
                    offCtx.moveTo(MARGIN + i * CELL_SIZE, MARGIN);
                    offCtx.lineTo(MARGIN + i * CELL_SIZE, MARGIN + (GRID_SIZE - 1) * CELL_SIZE);
                    offCtx.stroke();
                }
                
                // 星位
                const starPoints = [[3,3], [3,11], [11,3], [11,11], [7,7]];
                offCtx.fillStyle = '#000';
                for (const [x, y] of starPoints) {
                    offCtx.beginPath();
                    offCtx.arc(MARGIN + x * CELL_SIZE, MARGIN + y * CELL_SIZE, 4, 0, Math.PI * 2);
                    offCtx.fill();
                }
            }
            
            // 复制背景到主canvas
            ctx.drawImage(offscreenCanvas, 0, 0);
            
            // 绘制棋子
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (board[i][j]) {
                        drawPiece(i, j, board[i][j]);
                    }
                }
            }
        }
        
        // 点击事件
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const col = Math.round((x - MARGIN) / CELL_SIZE);
            const row = Math.round((y - MARGIN) / CELL_SIZE);
            
            if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
                if (!board[row][col]) {
                    placePiece(row, col);
                }
            }
        });
        
        // 触摸事件 - 阻止默认行为（手机端闪烁问题）
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            const col = Math.round((x - MARGIN) / CELL_SIZE);
            const row = Math.round((y - MARGIN) / CELL_SIZE);
            
            if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
                if (!board[row][col] && !gameOver) {
                    placePiece(row, col);
                }
            }
        }, { passive: false });
        
        // 落子
        function placePiece(row, col) {
            history.push({row, col, player: currentPlayer});
            board[row][col] = currentPlayer;
            draw();
            
            if (checkWin(row, col)) {
                gameOver = true;
                showWinner(currentPlayer === 'black' ? '⚫ 黑方' : '⚪ 白方');
                return;
            }
            
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            updateStatus();
        }
        
        // 检查胜利
        function checkWin(row, col) {
            const directions = [
                [[0, 1], [0, -1]],   // 水平
                [[1, 0], [-1, 0]],   // 垂直
                [[1, 1], [-1, -1]],  // 主对角线
                [[1, -1], [-1, 1]]   // 副对角线
            ];
            
            for (const [dir1, dir2] of directions) {
                let count = 1;
                
                // 正方向
                for (let i = 1; i < 5; i++) {
                    const r = row + dir1[0] * i;
                    const c = col + dir1[1] * i;
                    if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE && board[r][c] === currentPlayer) {
                        count++;
                    } else {
                        break;
                    }
                }
                
                // 反方向
                for (let i = 1; i < 5; i++) {
                    const r = row + dir2[0] * i;
                    const c = col + dir2[1] * i;
                    if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE && board[r][c] === currentPlayer) {
                        count++;
                    } else {
                        break;
                    }
                }
                
                if (count >= 5) return true;
            }
            
            return false;
        }
        
        // 显示胜利者
        function showWinner(winner) {
            document.getElementById('winnerText').textContent = winner + ' 获胜！🎉';
            document.getElementById('winner').classList.add('show');
        }
        
        // 更新状态显示
        function updateStatus() {
            document.getElementById('status').textContent = '当前回合: ' + (currentPlayer === 'black' ? '⚫ 黑方' : '⚪ 白方');
            
            document.getElementById('blackPlayer').classList.toggle('active', currentPlayer === 'black');
            document.getElementById('whitePlayer').classList.toggle('active', currentPlayer === 'white');
        }
        
        // 悔棋
        function undo() {
            if (history.length === 0) return;
            if (gameOver) return;
            
            const last = history.pop();
            board[last.row][last.col] = null;
            currentPlayer = last.player;
            draw();
            updateStatus();
        }
        
        // 重新开始
        function restart() {
            initBoard();
            currentPlayer = 'black';
            gameOver = false;
            history = [];
            draw();
            updateStatus();
            document.getElementById('winner').classList.remove('show');
        }
        
        // 初始化
        resizeCanvas();
        initBoard();
        draw();
        updateStatus();
        
        // 窗口大小改变时重新调整
        window.addEventListener('resize', () => {
            resizeCanvas();
            offscreenCanvas = null;  // 重建离屏canvas
            draw();
        });
    </script>
</body>
</html>
